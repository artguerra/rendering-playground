<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Tracing WebGPU</title>

    <style>
    :root {
      --bg: #0a0c10;
      --panel: rgba(12, 14, 18, 0.86);
      --panel-2: rgba(18, 21, 27, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #e8edf5;
      --muted: #9aa4b2;
      --accent: #7aa2ff;
      --warn: #ffb86b;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #1b2330 0%, #10141c 38%, #080a0e 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .app {
      position: relative;
      width: min(calc(100vw - 24px), calc((100vh - 24px) * 4 / 3));
      height: min(calc(100vh - 24px), calc((100vw - 24px) * 3 / 4));
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .overlay-shell {
      position: absolute;
      top: 12px;
      left: 12px;
      width: min(320px, calc(100% - 24px));
      max-height: calc(100% - 24px);
    }

    details.overlay {
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border-strong);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.overlay > summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    details.overlay > summary::-webkit-details-marker {
      display: none;
    }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .overlay-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .overlay-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .overlay-badge {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
    }

    .collapse-indicator {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1;
    }

    details.overlay[open] .collapse-indicator::before {
      content: "▾";
    }

    details.overlay:not([open]) .collapse-indicator::before {
      content: "▸";
    }

    .overlay-content {
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 10px 10px;
    }

    .overlay-content::-webkit-scrollbar {
      width: 8px;
    }

    .overlay-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric-card {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
    }

    .metric-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 0.98rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .section {
      display: grid;
      gap: 8px;
    }

    .row {
      position: relative;
      display: grid;
      gap: 6px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      overflow: visible;
    }

    .row.inline {
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .label-wrap {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
    }

    .value {
      font-size: 0.8rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    .hint {
      font-size: 0.76rem;
      color: var(--muted);
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    input[type="color"] {
      width: 38px;
      height: 28px;
      padding: 0;
      border: none;
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(122, 162, 255, 0.12);
      border: 1px solid rgba(122, 162, 255, 0.2);
      color: #dfe8ff;
      font-size: 0.82rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    details.group {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      overflow: hidden;
    }

    details.group > summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.025);
    }

    details.group > summary::-webkit-details-marker {
      display: none;
    }

    details.group > summary::after {
      content: "▾";
      color: var(--muted);
      font-size: 0.82rem;
    }

    details.group:not([open]) > summary::after {
      content: "▸";
    }

    .group-content {
      padding: 0 10px 10px;
      display: grid;
      gap: 8px;
    }

    .info {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      cursor: help;
      flex: 0 0 auto;
    }

    .info.warn {
      color: var(--warn);
      border-color: rgba(255, 184, 107, 0.28);
      background: rgba(255, 184, 107, 0.08);
    }
    .info.warn::after {
      color: var(--warn);
    }

    .row:has(.info:hover),
    .row:has(.info:focus-visible) {
      z-index: 30;
    }

    .info::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 5px);
      left: - 100%;
      width: max-content;
      max-width: 220px;
      padding: 7px 8px;
      border-radius: 8px;
      background: rgba(10, 12, 16, 0.97);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.3;
      white-space: normal;
      word-break: break-word;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      z-index: 100;
    }

    .info:hover::after,
    .info:focus-visible::after {
      opacity: 1;
    }

    @media (max-width: 700px) {
      .overlay-shell {
        width: min(280px, calc(100% - 20px));
        top: 10px;
        left: 10px;
      }
    }
    </style>
  </head>

  <body>
    <div class="app">
      <canvas width="1024" height="768"></canvas>

      <div class="overlay-shell">
        <details class="overlay" open>
          <summary>
            <div class="overlay-header">
              <div class="overlay-title-wrap">
                <div class="overlay-title">Path Tracer Debug</div>
                <div class="overlay-badge">WebGPU</div>
              </div>
              <div class="collapse-indicator"></div>
            </div>
          </summary>

          <div class="overlay-content">
            <div class="metrics">
              <div class="metric-card">
                <div class="metric-label">FPS</div>
                <div class="metric-value" id="fpsCounter">0.0</div>
              </div>
              <div class="metric-card">
                <div class="metric-label">Frame Time</div>
                <div class="metric-value" id="frameTime">0.0 ms</div>
              </div>
            </div>

            <div class="section">
              <div class="row inline">
                <input type="checkbox" id="raytracingCheckbox" />
                <label class="label" for="raytracingCheckbox">Path tracing</label>
              </div>

              <div class="row">
                <div class="row-top">
                  <div class="label-wrap">
                    <label class="label" for="rayDepth">Max ray depth</label>
                    <span
                      class="info warn"
                      tabindex="0"
                      data-tooltip="Increasing affects performance. Russian Roulette active after 3 bounces."
                    >!</span>
                  </div>
                </div>
                <input type="range" id="rayDepth" min="1" max="30" step="1" value="3" />
                <div class="row-top">
                  <span class="hint">Bounce limit</span>
                  <span id="depthText" class="stat">3</span>
                </div>
              </div>

              <div class="row">
                <div class="row-top">
                  <div class="label-wrap">
                    <label class="label" for="stratifiedGridN">Stratified grid N</label>
                    <span
                      class="info"
                      tabindex="0"
                      data-tooltip="Grid side per pixel used to shoot the sample rays."
                    >i</span>
                    <span
                      class="info warn"
                      tabindex="0"
                      data-tooltip="Increasing might severely affect performance."
                    >!</span>
                  </div>
                  <span class="value">√SPP</span>
                </div>
                <input type="range" id="stratifiedGridN" min="1" max="16" step="1" value="2" />
                <div class="row-top">
                  <span class="hint">Samples per pixel</span>
                  <span id="spp" class="stat">4</span>
                </div>
              </div>

              <div class="row inline">
                <input type="checkbox" id="accumulationCheckbox" checked />
                <div class="label-wrap">
                  <label class="label" for="accumulationCheckbox">Accumulation</label>
                  <span
                    class="info"
                    tabindex="0"
                    data-tooltip="Accumulates previous frame samples for cleaner preview and better realtime performance."
                  >i</span>
                </div>
              </div>

              <div class="row inline">
                <input type="checkbox" id="toneMappingCheckbox" />
                <label class="label" for="toneMappingCheckbox">Tone mapping</label>
              </div>

              <details class="group">
                <summary>Material controls</summary>
                <div class="group-content">
                  <div class="row inline">
                    <input type="color" id="diffuseAlbedo" value="#ffffff" />
                    <label class="label" for="diffuseAlbedo">Albedo</label>
                  </div>

                  <div class="row">
                    <div class="row-top">
                      <label class="label" for="roughness">Roughness</label>
                    </div>
                    <input type="range" id="roughness" min="0.1" max="1.0" step="0.05" value="0.7" />
                  </div>

                  <div class="row">
                    <div class="row-top">
                      <label class="label" for="metalness">Metalness</label>
                    </div>
                    <input type="range" id="metalness" min="0.0" max="1.0" step="0.05" value="0.3" />
                  </div>
                </div>
              </details>

              <div class="row inline">
                <input type="checkbox" id="viewBvh"/>
                <label class="label" for="viewBvh">BVH visualization</label>
              </div>

            </div>
          </div>
        </details>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
